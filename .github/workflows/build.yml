name: Build and Release

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Package Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Compress-Archive -Path build/bin/Release/Write_MMTS_OneService.dll, build/bin/Release/Write_MMTS_Default.dll, README.md, THIRD_PARTY_NOTICES.md -DestinationPath Write_MMTS_${{ github.ref_name }}_x64.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: Write_MMTS-x64
          path: |
            build/bin/Release/Write_MMTS_OneService.dll
            build/bin/Release/Write_MMTS_Default.dll

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: Write_MMTS_${{ github.ref_name }}_x64.zip
          draft: false
          prerelease: false

